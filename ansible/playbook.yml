---
- name: Setup K3s on EC2 Instance
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required dependencies
      apt:
        name:
          - curl
          - ca-certificates
        state: present

    - name: Install K3s using the official curl script
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Set correct permissions for /etc/rancher/k3s/k3s.yaml
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy k3s.yaml to ubuntu user's .kube config
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Export KUBECONFIG for the ubuntu user permanently
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export KUBECONFIG=~/.kube/config'
        state: present
