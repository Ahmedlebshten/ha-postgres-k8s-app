name: DevSecOps GitOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    # Essential permissions to allow the runner to modify manifests and push changes back to Git
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for successful git push operations

      # Step 1: Build Docker Image using GitHub Run Number (v1, v2, v3...)
      - name: Build Docker Image
        working-directory: ./app
        run: |
          VERSION="v${{ github.run_number }}"
          echo "Building Version: $VERSION"
          docker build -t ahmedlebshten/guestbook:$VERSION .
          docker tag ahmedlebshten/guestbook:$VERSION ahmedlebshten/guestbook:latest

      # Step 2: Security Gate - Scan Image for Vulnerabilities
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ahmedlebshten/guestbook:v${{ github.run_number }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # Step 3: Authenticate and Push Image to Docker Hub
      - name: Docker Hub Login and Push
        run: |
          VERSION="v${{ github.run_number }}"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ahmedlebshten/guestbook:$VERSION
          docker push ahmedlebshten/guestbook:latest

      # Step 4: GitOps - Update the Kubernetes Manifest automatically
      - name: Update Kubernetes Manifest in Git
        run: |
          VERSION="v${{ github.run_number }}"
          
          # Configure Git Bot Identity
          git config --global user.email "ahmed-bot@github.com"
          git config --global user.name "Ahmed DevOps Bot"
          
          # Use absolute path with GITHUB_WORKSPACE to ensure sed finds the file
          TARGET_FILE="$GITHUB_WORKSPACE/k8s-manifests/app-deployment.yml"
          
          # Update the image tag in the deployment manifest
          sed -i "s|image: ahmedlebshten/guestbook:.*|image: ahmedlebshten/guestbook:$VERSION|g" $TARGET_FILE
          
          # Commit and Push the change with [skip ci] to prevent infinite pipeline loops
          git add $TARGET_FILE
          git commit -m "chore: update image to $VERSION [skip ci]"
          git push origin main

      # Step 5: Continuous Deployment - Apply the updated manifest to K3s
      - name: Apply to K3s Cluster
        run: |
          echo "Applying the updated manifest to the production cluster..."
          # Applying the manifest from the specific path in workspace
          kubectl apply -f $GITHUB_WORKSPACE/k8s-manifests/app-deployment.yml
          
          # Verify the rollout
          kubectl rollout status deployment/guestbook-app