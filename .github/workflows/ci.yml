name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

# install dependencies and build
      - name: Install Dependencies & Build
        run: |
          echo "Starting Code Build..."
          # لو Node.js استخدم: npm install && npm run build
          # لو Go استخدم: go build ./...
          npm install

# run unit tests 
      - name: Run Unit Tests
        run: |
          echo "Running Unit Tests..."
          # لو Node.js استخدم: npm test
          # لو Go استخدم: go test ./...
          npm test || echo "No tests defined, skipping..."

# build docker image if tests passed
      - name: Build Docker Image
        run: |
          docker build -t ahmedlebshten/guestbook:${{ github.sha }} .
          docker tag ahmedlebshten/guestbook:${{ github.sha }} ahmedlebshten/guestbook:latest

# security scan with trivy
      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ahmedlebshten/guestbook:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

# push to Docker Hub
      - name: Login and Push
        if: success()
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ahmedlebshten/guestbook:${{ github.sha }}
          docker push ahmedlebshten/guestbook:latest

# deploy to k3s
      - name: Deploy to K3s
        if: success()
        run: |
          kubectl set image deployment/guestbook-app guestbook=ahmedlebshten/guestbook:${{ github.sha }}
          kubectl rollout status deployment/guestbook-app